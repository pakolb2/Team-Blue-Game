{% extends "base.html" %}
{% block title %}Jass — How to Play{% endblock %}

{% block content %}
<div class="tutorial-layout">

  <div style="text-align:center;padding:2.5rem 0 2rem">
    <h1 style="font-family:var(--font-display);font-size:2.5rem;
               font-weight:900;color:var(--gold-accent);margin-bottom:.4rem">
      How to Play Jass
    </h1>
    <p style="font-family:var(--font-body);font-style:italic;
              font-size:1.1rem;color:var(--cream-400)">
      Learn Schieber — Switzerland's national card game — in 10 steps.
    </p>
  </div>

  <div class="panel" style="min-height:420px">
    <div id="tutorial-content">
      <!-- Populated by tutorial.js -->
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/tutorial.js"></script>
<script>
  // Boot the tutorial
  initTutorial();
</script>
{% endblock %}
